<!doctype html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>Keynote</title><meta name="viewport" content="initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,width=device-width"/><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}</style></head><body id="body" bgcolor="black"><div id="stageArea"><div id="stage" class="stage"></div><div id="hyperlinkPlane" class="stage"></div></div><div id="slideshowNavigator"></div><div id="slideNumberControl"></div><div id="slideNumberDisplay"></div><div id="helpPlacard"></div><div id="waitingIndicator"><div id="waitingSpinner"></div></div><script src="assets/player/main.js"></script>
<script>
function applyScale(d){
  var vw=window.innerWidth,vh=window.innerHeight;
  var scale=Math.min(vw/d.width,vh/d.height);
  var tx=(vw-d.width*scale)/2,ty=(vh-d.height*scale)/2;
  var s=document.getElementById('_kns')||document.createElement('style');
  s.id='_kns';
  s.textContent='#stageArea{position:fixed!important;left:'+tx+'px!important;top:'+ty+'px!important;width:'+d.width+'px!important;height:'+d.height+'px!important;transform:scale('+scale+')!important;transform-origin:0 0!important;}';
  if(!document.getElementById('_kns'))document.head.appendChild(s);
}
document.addEventListener('DisplayManager:StageSizeDidChangeEvent',function(e){applyScale(e.detail);});
window.addEventListener('resize',function(){
  var el=document.getElementById('stageArea');
  if(el&&el.offsetWidth)applyScale({width:el.offsetWidth,height:el.offsetHeight});
});
</script>
</body></html>
